worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent $request_time '
                    '"$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    gzip            on;
    gzip_types      application/json text/plain;
    gzip_min_length 1024;

    # Device readings: 1 req/5s per device_id (burst 10)
    # General API:     30 req/min per IP
    limit_req_zone $http_x_device_id   zone=device_zone:20m rate=12r/m;
    limit_req_zone $binary_remote_addr zone=ip_zone:20m    rate=30r/m;
    limit_req_status 429;

    upstream medice_api {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size  1m;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /health {
            access_log off;
            proxy_pass http://medice_api;
        }

        location = /readings {
            limit_req zone=device_zone burst=10 nodelay;
            proxy_pass http://medice_api;
        }

        location ~ ^/(docs|redoc|openapi.json)$ {
            proxy_pass http://medice_api;
        }

        location /hospital/ {
            limit_req zone=ip_zone burst=20 nodelay;
            proxy_pass http://medice_api;
        }

        location / {
            limit_req zone=ip_zone burst=30 nodelay;
            proxy_pass http://medice_api;
        }
    }
}
